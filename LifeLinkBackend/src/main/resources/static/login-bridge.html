<!DOCTYPE html>
<html>
<head>
    <title>Connexion LifeLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FFF8F3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 90%;
            max-width: 400px;
            background-color: transparent;
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .login-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            width: 80%;
        }

        .login-btn:hover {
            background-color: #ff3333;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 77, 77, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(255, 77, 77, 0.1);
            border-radius: 50%;
            border-top: 4px solid #ff4d4d;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background-size: cover;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ff4d4d" fill-opacity="0.2" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,218.7C672,235,768,245,864,229.3C960,213,1056,171,1152,165.3C1248,160,1344,192,1392,208L1440,224L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat;
            z-index: -1;
        }
    </style>
    <script>
        function sendMessageToFlutter(message) {
            if (window.FlutterApp) {
                window.FlutterApp.postMessage(JSON.stringify(message));
            }
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('login-btn').disabled = true;
            document.getElementById('login-btn').style.opacity = '0.7';
            document.getElementById('message').innerText = "Connexion en cours...";
        }

        function openAuthorizationDirectly() {
            showLoading();

            var authUrl = "http://10.0.2.2:3000/authorize" +
                "?client_id=IBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAxWVg7R" +
                "&redirect_uri=http://localhost:4200/callback" +
                "&response_type=code" +
                "&scope=openid%20profile" +
                "&state=eree2311" +
                "&nonce=" + generateRandomString(10) +
                "&acr_values=mosip:idp:acr:generated-code%20mosip:idp:acr:biometrics%20mosip:idp:acr:static-code" +
                "&claims_locales=en" +
                "&display=page" +
                "&prompt=consent" +
                "&ui_locales=en";

            setTimeout(function() {
                window.location.href = authUrl;
            }, 500);

            sendMessageToFlutter({type: 'status', message: 'Redirection vers page d\'autorisation'});
        }

        // Générer une chaîne aléatoire
        function generateRandomString(length) {
            let result = '';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        // Vérifier si nous sommes sur une URL de callback
        function checkCallback() {
            const url = window.location.href;
            if (url.includes('/callback') && url.includes('code=')) {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                    document.getElementById('message').innerText = "Authentification réussie, redirection en cours...";
                    sendMessageToFlutter({type: 'callback', code: code});
                }
            }
        }
    </script>
</head>
<body onload="checkCallback()">
<div class="login-container" id="login-container">
    <img src="https://i.imgur.com/q7oel6B.png" alt="LifeLink Logo" class="logo">
    <h1>Bienvenue sur LifeLink</h1>
    <p class="message" id="message">Connectez-vous pour accéder à votre compte</p>

    <button class="login-btn" id="login-btn" onclick="openAuthorizationDirectly()">
        Se connecter avec eSignet
    </button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <p class="footer">Don de sang • Portail des donneurs</p>
</div>

<div class="login-container" id="success-message" style="display:none;">
    <img src="https://i.imgur.com/q7oel6B.png" alt="LifeLink Logo" class="logo">
    <h1>Connexion réussie!</h1>
    <p class="message">Vous allez être redirigé vers votre espace personnel...</p>
    <div class="loading active">
        <div class="spinner"></div>
    </div>
</div>

<div class="wave"></div>
</body>
</html>
